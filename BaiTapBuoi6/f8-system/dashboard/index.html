<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DASHBOARD</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/theme.css" />

        <!-- Internal CSS riêng cho dashboard. Ưu tiên internal hơn external-->

        <style>
            h3.title {
                color: blueviolet;
            }

            p.highlight {
                font-style: italic;
            }
        </style>
    </head>
    <body>
        <!-- Phan tu nay co: tag(h1) + class(.title) + id(#special) + inline style
        Selector thang: inline style
        Ly do: inline style co do uu tien cao nhat trong CSS
        Mau hien thi: darkslate-->
        <h1 class="title" id="special" style="color: darkslategray">
            DASHBOARD
        </h1>

        <h2 class="section">Tong quan he thong</h2>

        <div class="big">
            <!-- Phan tu nay co: tag(h3) + class(.title) + internal (h3.title)
            Selector thang: h3.title trong internal
            Ly do: theme.css duoc load sau base.css nen override và sau đó lại ưu tiên internal hơn
            Mau hien thi: blueviolet -->
            <h3 class="title">Courses</h3>

            <!--
            Phan tu nay co: tag(p) + class(.highlight)
            Selector thang: .highlight
            Ly do: class co do uu tien cao hon tag
            Mau hien thi: pink
            -->
            <p class="highlight">Quan ly cac khoa hoc trong he thong</p>

            <h3 class="title">Students</h3>
            <p class="highlight">Quan ly danh sach hoc vien</p>

            <h3 class="title">Teachers</h3>
            <p class="highlight">Quan ly giang vien</p>

            <h3 class="title">Orders</h3>
            <p class="highlight">Quan ly don hang</p>

            <h3 class="title">Reports</h3>
            <p class="highlight">Thong ke bao cao he thong</p>
        </div>
    </body>
</html>
