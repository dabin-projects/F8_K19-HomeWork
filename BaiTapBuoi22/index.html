<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hóa Đơn Bán Lẻ - Tailwind CSS</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            body {
                font-family: 'Inter', sans-serif;
            }
        </style>
    </head>
    <body
        class="bg-gray-100 flex justify-center py-10 px-5 m-0 text-gray-800 antialiased"
    >
        <div id="invoice-root" class="w-full"></div>

        <script>
            const data = {
                meta: {
                    invoiceNo: 'WM-20260521-0001',
                    saleDate: '2026/05/21',
                    currency: 'VND',
                    paymentMethod: 'Cash',
                },
                seller: {
                    name: 'WinMark 2 Hai Bà Trưng',
                    address: 'Hai Bà Trưng - Hoàn Kiếm - HN',
                    phone: '012345678',
                    representative: 'Đại diện WinMark',
                },
                customer: {
                    name: 'Nguyen Van A',
                    age: 20,
                    address: 'Ha Dong - Ha noi',
                },
                items: [
                    {
                        no: 1,
                        name: 'Ao Thun',
                        size: 'XL',
                        quantity: 1,
                        price: 200000,
                    },
                    {
                        no: 2,
                        name: 'Ao Thun',
                        size: 'XL',
                        quantity: 1,
                        price: 200000,
                    },
                ],
                promotion: {
                    description:
                        'Khuyến mãi 50% chỉ dành cho khách hàng thân thiết',
                    discountPercent: 50,
                },
            };

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('vi-VN').format(amount) + ' đ';
            };

            const renderInvoice = (invoiceData) => {
                const root = document.getElementById('invoice-root');

                let subTotal = 0;
                const itemsHTML = invoiceData.items
                    .map((item) => {
                        const itemTotal = item.quantity * item.price;
                        subTotal += itemTotal;
                        return `
              <tr>
                <td class="py-4 px-2 text-left border-b border-gray-100 text-sm text-gray-400">${item.no}</td>
                <td class="py-4 px-2 text-left border-b border-gray-100 text-sm font-medium text-gray-800">${item.name}</td>
                <td class="py-4 px-2 text-left border-b border-gray-100 text-sm text-gray-500">${item.size}</td>
                <td class="py-4 px-2 border-b border-gray-100 text-sm text-center text-gray-800">${item.quantity}</td>
                <td class="py-4 px-2 border-b border-gray-100 text-sm text-right text-gray-800">${formatCurrency(item.price)}</td>
                <td class="py-4 px-2 border-b border-gray-100 text-sm text-right font-semibold text-gray-800">${formatCurrency(itemTotal)}</td>
              </tr>
            `;
                    })
                    .join('');

                const discountAmount =
                    subTotal * (invoiceData.promotion.discountPercent / 100);
                const totalPayment = subTotal - discountAmount;

                const invoiceHTML = `
          <div class="bg-white w-full max-w-[800px] mx-auto p-10 shadow-[0_4px_12px_rgba(0,0,0,0.1)] rounded-lg">
            <div class="flex justify-between mb-10">
              <div>
                <div class="flex items-center gap-2.5">
                  <div class="bg-[#1a1a2e] text-white font-bold px-2 py-1.5 rounded text-sm">WM</div>
                  <h1 class="text-2xl font-bold text-[#1a1a2e] m-0">WinMark 2 Hai Bà Trưng</h1>
                </div>
                <p class="text-[13px] text-gray-500 mt-2">Cung cấp sản phẩm thời trang cao cấp & thiết kế độc quyền.</p>
              </div>
              <div class="text-right text-sm text-gray-600">
                <div class="text-emerald-500 font-semibold text-xs uppercase tracking-wide mb-2">Hóa Đơn Bán Lẻ</div>
                <p class="my-1">Mã số: <strong class="text-gray-800 font-bold">${invoiceData.meta.invoiceNo}</strong></p>
                <p class="my-1">Ngày bán: ${invoiceData.meta.saleDate}</p>
              </div>
            </div>

            <div class="flex justify-between mb-8 gap-5">
              <div class="flex-1">
                <div class="text-[11px] text-gray-500 uppercase tracking-wide mb-4 border-b border-gray-200 pb-2">Đơn vị bán hàng (Seller)</div>
                <div class="font-semibold text-base mb-2 text-[#1a1a2e]">${invoiceData.seller.name}</div>
                <div class="text-sm text-gray-600 my-1.5 flex items-center gap-2">
                  <svg class="w-4 h-4 fill-gray-400" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                  ${invoiceData.seller.address}
                </div>
                <div class="text-sm text-gray-600 my-1.5 flex items-center gap-2">
                  <svg class="w-4 h-4 fill-gray-400" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
                  ${invoiceData.seller.phone}
                </div>
              </div>

              <div class="flex-1">
                <div class="text-[11px] text-gray-500 uppercase tracking-wide mb-4 border-b border-gray-200 pb-2">Khách hàng (Buyer)</div>
                <div class="font-semibold text-base mb-2 text-[#1a1a2e]">${invoiceData.customer.name}</div>
                <div class="text-sm text-gray-600 my-1.5 flex items-center gap-2 mb-3">
                  Tuổi: <span class="text-gray-500">${invoiceData.customer.age}</span>
                </div>
                <div class="text-sm text-gray-600 my-1.5 flex items-center gap-2">
                  <svg class="w-4 h-4 fill-gray-400" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                  ${invoiceData.customer.address}
                </div>
              </div>
            </div>

            <table class="w-full border-collapse mb-10">
              <thead>
                <tr>
                  <th class="py-4 px-2 text-left border-b-2 border-gray-100 text-[11px] text-gray-500 uppercase tracking-wide font-medium">STT</th>
                  <th class="py-4 px-2 text-left border-b-2 border-gray-100 text-[11px] text-gray-500 uppercase tracking-wide font-medium">Tên Sản Phẩm</th>
                  <th class="py-4 px-2 text-left border-b-2 border-gray-100 text-[11px] text-gray-500 uppercase tracking-wide font-medium">Size</th>
                  <th class="py-4 px-2 text-center border-b-2 border-gray-100 text-[11px] text-gray-500 uppercase tracking-wide font-medium">SL</th>
                  <th class="py-4 px-2 text-right border-b-2 border-gray-100 text-[11px] text-gray-500 uppercase tracking-wide font-medium">Đơn Giá</th>
                  <th class="py-4 px-2 text-right border-b-2 border-gray-100 text-[11px] text-gray-500 uppercase tracking-wide font-medium">Thành Tiền</th>
                </tr>
              </thead>
              <tbody>
                ${itemsHTML}
              </tbody>
            </table>

            <div class="flex justify-between items-start border-t border-gray-200 pt-5">
              <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-lg flex items-center gap-3 w-[45%]">
                <div class="bg-emerald-500 text-white rounded-full w-6 h-6 flex items-center justify-center shrink-0">
                  <svg class="w-3.5 h-3.5 fill-white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
                <div>
                  <strong class="block text-[13px] text-emerald-800 mb-1 font-bold">Khuyến mãi / Trợ giá</strong>
                  <span class="text-[13px] text-gray-600">${invoiceData.promotion.description}</span>
                </div>
              </div>

              <div class="w-[45%]">
                <div class="flex justify-between text-[15px] mb-3 text-gray-600">
                  <span>Cộng tiền hàng:</span>
                  <strong class="text-gray-800">${formatCurrency(subTotal)}</strong>
                </div>
                <div class="flex justify-between text-[15px] mb-3 text-emerald-500">
                  <span>Khấu trừ giảm giá:</span>
                  <span>-${formatCurrency(discountAmount)}</span>
                </div>
                <div class="flex justify-between text-lg font-bold text-[#1a1a2e] mt-5 border-t border-gray-200 pt-4">
                  <span>Tổng thanh toán:</span>
                  <span class="text-emerald-500 text-xl">${formatCurrency(totalPayment)}</span>
                </div>
              </div>
            </div>
          </div>
        `;

                root.innerHTML = invoiceHTML;
            };

            renderInvoice(data);
        </script>
    </body>
</html>
