<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Form đăng ký thành viên</title>
    </head>
    <body>
        <h1>ĐĂNG KÝ THÀNH VIÊN</h1>
        <form action="https://api-gateway.f8.edu.vn/action_page.php" method="post" enctype="multipart/form-data">
        <fieldset>
    <!-- Thông tin cơ bản -->
    <legend>Thông tin cơ bản</legend>
        <div>
                <label for="fullname">Họ và tên</label><br>
                <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required autofocus tabindex="1">
        </div><br>
       
        <div>
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required tabindex="2">
        </div><br>
        
        <div>
            <label for="password">Mật khẩu</label><br>
            <input type="password" name="password" id="password"minlength="6"
            autocomplete="off" required tabindex="3">
        </div><br>
        
        <div>
            <label for="confirm_password">Nhập lại mật khẩu</label><br>
            <input type="password" id="confirm_password" name="confirm_password" required tabindex="4">
        </div><br>

        <div>
            <label for="phone">Số điện thoại</label><br>
            <input type="tel" name="phone" id="phone" placeholder="0xxxxxxxxxx" pattern="0[0-9]{9}" tabindex="5">
        </div><br>

        <div>
            <label for="birthday">Ngày sinh</label><br>
            <input type="date" name="birthday" id="birthday" required tabindex="6">
        </div><br>

      <div>
                <label for="age">Tuổi</label><br>
                <input type="number" id="age" name="age" min="1" max="120" tabindex="7">
            </div><br>

            <div>
                <label for="website">Website cá nhân</label><br>
                <input type="url" id="website" name="website" placeholder="https://..." tabindex="8">
            </div><br>

            <div>
                <label for="address">Địa chỉ:</label><br>
                <input type="text" id="address" name="address" placeholder="Số nhà, đường, phường/xã" tabindex="9">
            </div><br>

            <div>
                <label for="zipcode">Mã bưu chính:</label><br>
                <input type="text" id="zipcode" name="zipcode" maxlength="6" placeholder="700000" tabindex="9">
            </div><br>

            <!-- READONLY -->
        <div>
            <label for="member_id">Mã thành viên</label><br>
            <input type="text"
                   id="member_id"
                   name="member_id"
                   value="AUTO_GENERATED"
                   readonly
                   tabindex="11">
        </div><br>

        <!-- DISABLED -->
        <div>
            <label for="vip_level">Cấp độ VIP</label><br>
            <input type="text"
                   id="vip_level"
                   value="Chưa kích hoạt"
                   disabled>
        </div><br>

        </fieldset>
        <br>

        <fieldset>
            <legend>Thông tin bổ sung</legend>
            <div>
                <label>Giới tính</label><br>
                <input type="radio" id="male" name="gender" value="male" required> <label for="male" tabindex="10">Nam</label>
                <input type="radio" id="female" name="gender" value="female"> <label for="female" tabindex="11">Nữ</label>
                <input type="radio" id="other" name="gender" value="other"> <label for="other" tabindex="12">Khác</label>
            </div><br>

            <div>
                <label>Sở thích</label><br>
                <input type="checkbox" id="read" name="hobby" value="read" tabindex="13"> <label for="read">Đọc sách</label>
                <input type="checkbox" id="music" name="hobby" value="music" tabindex="14"> <label for="music">Nghe nhạc</label>
                <input type="checkbox" id="travel" name="hobby" value="travel" tabindex="15"> <label for="travel">Du lịch</label>
                <input type="checkbox" id="code" name="hobby" value="code" tabindex="16"> <label for="code">Lập trình</label>
                <input type="checkbox" id="cook" name="hobby" value="cook" tabindex="17"> <label for="cook">Nấu ăn</label>
                <input type="checkbox" id="sport" name="hobby" value="sport" tabindex="18"> <label for="sport">Thể thao</label>
            </div><br>

            <div>
                <label>Trình độ học vấn</label><br>
                <select id="education" name="education" tabindex="19">
                    <option value="high school">Trung học</option>
                    <option value="college">Cao đẳng</option>
                    <option value="university">Đại học</option>
                    <option value="post_graduate">Sau đại học</option>
                </select>
            </div><br>

            <div>
                <label for="city">Tỉnh / Thành phố (chọn nhiều)</label><br>
                <select id="city" name="city" multiple size="5" tabindex="20">
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="cantho">Cần Thơ</option>
                    <option value="haiphong">Hải Phòng</option>
                </select>
            </div><br>

          <div>
                <label for="job">Nghề nghiệp</label>
                <select id="job" name="job" tabindex="21">
                    <option value="pupil">Học sinh</option>
                    <option value="student">Sinh viên</option>
                    <option value="office_worker">Nhân viên văn phòng</option>
                    <option value="developer">Lập trình viên</option>
                    <option value="other">Khác</option>
                </select>
            </div><br>
           
            <div>
                <label>Khoá học quan tâm</label>
                <input type="checkbox" id="html" name="course" value="html_css" tabindex="22"> <label for="html">HTML-CSS</label>
                <input type="checkbox" id="js" name="course" value="javascript" tabindex="23"> <label for="js">JavaScript</label>
                <input type="checkbox" id="react" name="course" value="reactjs" tabindex="24"> <label for="react">ReactJS</label>
                <input type="checkbox" id="node" name="course" value="nodejs" tabindex="25"> <label for="node">NodeJS</label>
                <input type="checkbox" id="py" name="course" value="python" tabindex="26"> <label for="py">Python</label>
            </div><br>

            <div>
                <label>Hình thức học</label>
                <input type="radio" id="online" name="study_type" value="online" tabindex="27"> <label for="online">Online</label>
                <input type="radio" id="offline" name="study_type" value="offline" tabindex="28"> <label for="offline">Offline</label>
            </div><br>

            <div>
                <label for="bio">Giới thiệu bản thân</label><br>
                <textarea id="bio" name="bio" rows="4" placeholder="Viết vài dòng về bản thân..." tabindex="27"></textarea>
            </div><br>

            <div>
                <label for="avatar">Ảnh đại diện</label>
                <input type="file" id="avatar" name="avatar" accept=".jpg,.png" tabindex="28">
            </div><br>

            <div>
                <label for="cv">CV / Hồ sơ</label>
                <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" tabindex="29">
            </div><br>
            
                        <!-- Input đặc biệt -->
            <fieldset>
            <legend>Input đặc biệt</legend>

            <div>
                <label for="fav_color">Màu yêu thích</label><br>
                <input type="color" id="fav_color" name="fav_color" value="#ff6600" tabindex="30">
            </div><br>

            <div>
                <label for="satisfaction">Mức độ hài lòng (0-10)</label><br>
                <input type="range" id="satisfaction" name="satisfaction" min="0" max="10" value="5" tabindex="31">
            </div><br>

            <div>
                <label for="study_time">Giờ học trong ngày</label><br>
                <input type="time" id="study_time" name="study_time" tabindex="32">
            </div><br>

            <div>
                <label for="start_month">Tháng bắt đầu học</label><br>
                <input type="month" id="start_month" name="start_month" tabindex="33">
            </div><br>

            <div>
                <label for="start_week">Tuần bắt đầu học</label><br>
                <input type="week" id="start_week" name="start_week" tabindex="34">
            </div><br>

            <div>
                <label for="register_at">Ngày & giờ đăng ký</label><br>
                <input type="datetime-local" id="register_at" name="register_at" tabindex="35">
            </div><br>

            <div>
                <label for="search_course">Tìm kiếm khoá học</label><br>
                <input type="search" id="search_course" name="search_course" placeholder="Nhập tên khoá học..." tabindex="36">
            </div><br>

            <div>
                <label for="experience">Số năm kinh nghiệm</label><br>
                <input type="number" id="experience" name="experience" min="0" max="50" step="1" tabindex="37">
            </div><br>

            <div>
                <label for="budget">Mức học phí mong muốn</label><br>
                <input type="range" id="budget" name="budget" min="0" max="5000000" step="100000" value="1000000" tabindex="38">
            </div><br>

            <div>
                <label for="fav_lang">Ngôn ngữ lập trình yêu thích</label><br>
                <input type="text" id="fav_lang" name="fav_lang" placeholder="VD: JavaScript, Python..." tabindex="39">
            </div><br>
        </fieldset>

        <!-- Xác nhận & điều khoản -->
        <fieldset>
        <legend>Xác nhận & điều khoản</legend>

            <div>
                <input type="checkbox" id="agree_terms" name="agree_terms" value="accepted" required tabindex="40">
                <label for="agree_terms">Tôi đồng ý với điều khoản sử dụng</label>
            </div><br>

            <div>
                <input type="checkbox" id="subscribe" name="subscribe" value="yes" tabindex="41">
                <label for="subscribe">Nhận thông báo qua email</label>
            </div><br>

            <div>
                <input type="checkbox" id="sms_notify" name="sms_notify" value="yes" tabindex="42">
                <label for="sms_notify">Nhận thông báo qua SMS</label>
            </div><br>

            <div>
                <label for="ref_code">Mã giới thiệu</label><br>
                <input type="text" id="ref_code" name="ref_code" placeholder="Nhập mã nếu có" tabindex="43">
            </div><br>

            <input type="hidden" name="course_id" value="F8_2024" tabindex="44">

        </fieldset>

        <br>

        <div>
            <button type="submit" tabindex="46">Đăng ký ngay</button>
            <button type="reset" tabindex="47">Nhập lại</button>
        </div>

        </form>
    </body>
</html>
