<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Toast Notification</title>
        <style>
            /* Ẩn toast message khi reload trang/ khi mới vào trang */
            .toast {
                display: none;
            }
            #toast-toggle:checked ~ .toast {
                display: inline-block;
            }

            /* Chỉnh css cho btn mở thông báo */
            .open-btn {
                background-color: #333;
                color: white;
                padding: 12px 24px;
                border-radius: 4px;
                cursor: pointer;
            }

            /* Chỉnh css cho hộp thông báo */
            .toast {
                background-color: green;
                color: white;
                padding: 12px 24px;
                border-radius: 4px;
            }
            .toast-msg {
                margin-right: 8px;
            }

            .close-btn {
                background: rgba(19, 13, 13, 0.2);
                color: #ffffff;
                border-radius: 2px;
                padding: 6px;
                cursor: pointer;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <!-- Dùng hidden để ẩn checkbox -->
        <input type="checkbox" id="toast-toggle" hidden />
        <label for="toast-toggle" class="open-btn">Hiện thông báo</label>

        <div class="toast">
            <span class="icon">️🎉️</span>
            <span class="toast-msg"> Lưu thành công!</span>
            <!-- label trỏ cùng id với checkbox → bấm sẽ bỏ tích,
       khiến toast ẩn trở lại -->
            <label for="toast-toggle" class="close-btn">✕</label>
        </div>
    </body>
</html>
