<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Strips Hover Effect</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="strips-container">
            <!-- Strip 01 -->
            <div class="strip-item strip-01-relax">
                <img
                    src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop"
                    alt="Relax"
                />
                <div class="overlay"></div>
                <div class="strip-title">Relax</div>
            </div>

            <!-- Strip 02 -->

            <div class="strip-item strip-02-explore">
                <img
                    src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop"
                    alt="Explore"
                />
                <div class="overlay"></div>
                <div class="strip-title">Explore</div>
            </div>

            <!-- Strip 03 -->

            <div class="strip-item strip-03-travel">
                <img
                    src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop"
                    alt="Travel"
                />
                <div class="overlay"></div>
                <div class="strip-title">Travel</div>
            </div>

            <!-- Strip 04 -->

            <div class="strip-item strip-04-achieve">
                <img
                    src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop"
                    alt="Achieve"
                />
                <div class="overlay"></div>
                <div class="strip-title">Achieve</div>
            </div>

            <!-- Strip 05 -->

            <div class="strip-item strip-05-dare">
                <img
                    src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop"
                    alt="Dare"
                />
                <div class="overlay"></div>
                <div class="strip-title">Dare</div>
            </div>
        </div>
    </body>
</html>
